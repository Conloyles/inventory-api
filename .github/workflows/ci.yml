name: CI/CD Pipeline

on:
    push:
        branches: [ main ]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: conloyles/inventory-api

jobs:
    build-and-push:
        runs-on: self-hosted
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Github Container Registry
              uses: docker/login-action@v3
              with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.CR_PAT }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: docker/Dockerfile
                push: true
                tags: ghcr.io/conloyles/inventory-api:latest

    deploy:
        runs-on: self-hosted
        needs: build-and-push

        steps:
          - name: Deploy to Kubernetes
            run: |
              export KUBECONFIG=/home/connor/.kube/config
              kubectl set image deployment/inventory-api inventory-api=ghcr.io/conloyles/inventory-api:latest
              kubectl rollout status deployment/inventory-api --timeout=120s