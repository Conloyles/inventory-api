name: CI/CD Pipeline

on:
    push:
        branches: [ main ]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: conloyles/inverntory-api

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
                uses: actions/checkout@v3
            
            - name: Log in to Github Container Registry
                uses: docker/login-action@v2
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.CR_PAT }}
            
            - name: Build and push Docker image
                uses: docker/build-push-action@v4
                with:
                    context: .
                    file: docker/Dockerfile
                    push: true
                    tags: ghcr.io/conloyles/inventory-api:latest

    deploy: 
        runs-on: ubuntu-latest
        needs: build-and-push

        steps: 
            - name: Deploy to server via SSH
                uses: appleboy/ssh-action@v0.1.10
                with:
                    host: ${{ secrets.SERVER_HOST }}
                    username: ${{ secrets.SERVER_USER }}
                    key: ${{ secrets.SERVER_SSH_KEY }}
                    script: |
                        cd ~/inventory-api
                        git pull
                        sudo k3s ctr images pull ghcr.io/conloyles/inventory-api:latest
                        kuebctl set image deployment/inventory-api inventory-api=ghcr.io/conloyles/inventory-api:latest
                        kubectl rollout status deployment/inventory-api