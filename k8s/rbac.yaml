apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-api-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inventory-api-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: 
  name: inventory-api-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: inventory-api-sa
  namespace: default
roleRef:
  kind: Role
  name: inventory-api-role
  apiGroup: rbac.authorization.k8s.io
  