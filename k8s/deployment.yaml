apiVersion: apps/v1
kind: Deployment
metadata: 
  name: Invenotory-api
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          image: inventory-api:latest
          ports:
          - containerPort: 5000
          resources:
            requests:
              memory: "64Mi"
              cpu: "500m"
              